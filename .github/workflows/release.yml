name: Release Extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build extension
        run: npm run build 

      - name: フォルダにまとめてZIP化
        run: |
          mkdir -p extension-${{ github.ref_name }}

          cp -r dist/* extension-${{ github.ref_name }}

          mkdir -p release-artifacts
          zip -r release-artifacts/extension.zip extension/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/extension.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}